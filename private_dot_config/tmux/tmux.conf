# Leader
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vim-like motions
set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Agentic layout: creates panes if needed, then applies layout
# Left pane 65%, right pane 35%
bind-key P run-shell ~/.config/tmux/scripts/setup-agentic-layout.sh

# Pane splits (mnemonic: v=vertical split, s=split horizontal)
bind-key v split-window -h
bind-key s split-window -v

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Status bar on top
set -g status-position top

# Mouse
set -g mouse on

# 1-based indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g default-terminal "tmux-256color"
set -g extended-keys on
set -g extended-keys-format csi-u
setw -g xterm-keys on

# --- Catppuccin theme ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_number_color "#{@thm_surface_0}"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_text_color "default"
set -g @catppuccin_window_current_text_color "default"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_session_text " #S"
# Clear cached current window separators so catppuccin rebuilds them as basic
set -Ug @catppuccin_window_current_left_separator
set -Ug @catppuccin_window_current_right_separator
set -Ug @catppuccin_window_current_middle_separator
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Padding: empty line below status bar
set -g status 2
set -g 'status-format[1]' ''

# Status modules
set -g status-right-length 100
set -g status-left ""
set -g @catppuccin_directory_text ' #(~/.config/tmux/scripts/abbrev-path.sh "#{pane_current_path}")'
set -g status-right "#{E:@catppuccin_status_directory} #{E:@catppuccin_status_session}"

# --- Sesh (session manager) ---
bind-key x kill-pane  # skip "kill-pane ?" prompt
set -g detach-on-destroy off  # don't exit tmux when last session closes
bind -N "last-session" C-l run-shell "sesh last"
bind-key "T" run-shell "sesh connect \"\$(
  sesh list --icons | fzf-tmux -p 80%,70% \\
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \\
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \\
    --bind 'tab:down,btab:up' \\
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \\
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \\
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \\
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \\
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \\
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \\
    --preview-window 'right:55%' \\
    --preview 'sesh preview {}'
)\""
bind-key "W" run-shell ~/.config/tmux/scripts/window-picker.sh

# --- TPM plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'loichyan/tmux-toggle-popup'

# Continuum: auto-restore last session
set -g @continuum-restore 'on'

# Resurrect: restore nvim session (requires persistence.nvim)
set -g @resurrect-strategy-nvim 'session'

# Resurrect: capture pane contents (scrollback buffer)
set -g @resurrect-capture-pane-contents 'on'

# Toggle popup: autostart for faster first call
set -g @popup-autostart on

# Toggle popup: share popups by project directory
set -gF @popup-id-format '#{b:pane_current_path}/{popup_name}'

# Toggle popup bindings
bind -n M-t run "#{@popup-toggle} -w50% -h50% -Ed'##{pane_current_path}'"

run-shell ~/.config/tmux/plugins/tpm/tpm
